<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proveedores — Tejidos Castañeda</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav class="tc-nav">
  <div class="tc-nav-brand"><img id="nav-logo" src="/img/logo.svg" alt="Logo"><span id="nav-biz">Tejidos Castañeda</span></div>
  <div class="tc-nav-right">
    <span id="nav-empleado" class="tc-nav-user"></span>
    <span id="nav-rol" class="tc-nav-rol"></span>
    <a href="/dashboard.html" class="tc-nav-link">Dashboard</a>
    <button onclick="cerrarSesion()" class="tc-btn-logout">Salir</button>
  </div>
</nav>

<div class="tc-wrap">
  <div class="tc-page-header">
    <div><h1 class="tc-page-title">Proveedores</h1><p class="tc-page-sub">Registro de proveedores y sus productos</p></div>
    <button class="btn-primary" onclick="PROV.abrirNuevo()">+ Nuevo proveedor</button>
  </div>

  <div class="tc-table-wrap">
    <table class="tc-table">
      <thead><tr><th>Nombre</th><th>Contacto</th><th>Teléfono</th><th>Email</th><th>Ciudad</th><th style="text-align:center">Productos</th><th>Acciones</th></tr></thead>
      <tbody id="tabla-prov"><tr><td colspan="7" class="tc-empty">Cargando...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="tc-overlay" id="modal-prov" style="display:none">
  <div class="tc-modal" style="max-width:480px">
    <div class="tc-modal-hdr"><h3 id="prov-titulo">Nuevo proveedor</h3><button class="tc-modal-close" onclick="hideModal('modal-prov')">×</button></div>
    <div class="tc-modal-body">
      <input type="hidden" id="prov-id">
      <div class="tc-form-group"><label class="tc-label">Nombre *</label><input type="text" id="prov-nombre" class="tc-input"></div>
      <div class="tc-form-row">
        <div class="tc-form-group"><label class="tc-label">Contacto</label><input type="text" id="prov-contacto" class="tc-input"></div>
        <div class="tc-form-group"><label class="tc-label">Teléfono</label><input type="tel" id="prov-tel" class="tc-input"></div>
      </div>
      <div class="tc-form-row">
        <div class="tc-form-group"><label class="tc-label">Email</label><input type="email" id="prov-email" class="tc-input"></div>
        <div class="tc-form-group"><label class="tc-label">Ciudad</label><input type="text" id="prov-ciudad" class="tc-input"></div>
      </div>
      <div id="prov-err" class="tc-alert tc-alert-err" style="display:none"></div>
    </div>
    <div class="tc-modal-footer">
      <button class="btn-secondary" onclick="hideModal('modal-prov')">Cancelar</button>
      <button class="btn-primary" onclick="PROV.guardar()">Guardar</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
proteger('admin','propietario');

const PROV={
  async init(){await this.cargar()},
  async cargar(){
    const r=await api('/proveedores');
    if(!r?.ok)return;
    const t=document.getElementById('tabla-prov');
    if(!r.proveedores.length){t.innerHTML='<tr><td colspan="7" class="tc-empty">Sin proveedores</td></tr>';return}
    t.innerHTML=r.proveedores.map(p=>`<tr>
      <td style="font-weight:500">${p.nombre}</td>
      <td>${p.contacto||'—'}</td>
      <td>${p.telefono||'—'}</td>
      <td style="color:var(--txt3)">${p.email||'—'}</td>
      <td>${p.ciudad||'—'}</td>
      <td style="text-align:center">${p.num_productos||0}</td>
      <td><button class="btn-sm" onclick="PROV.editar(${JSON.stringify(JSON.stringify(p))})">Editar</button></td>
    </tr>`).join('');
  },
  abrirNuevo(){
    ['prov-id','prov-nombre','prov-contacto','prov-tel','prov-email','prov-ciudad'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
    document.getElementById('prov-titulo').textContent='Nuevo proveedor';
    document.getElementById('prov-err').style.display='none';
    showModal('modal-prov');
  },
  editar(jsonStr){
    const p=JSON.parse(jsonStr);
    document.getElementById('prov-titulo').textContent='Editar proveedor';
    document.getElementById('prov-id').value=p.id;
    document.getElementById('prov-nombre').value=p.nombre||'';
    document.getElementById('prov-contacto').value=p.contacto||'';
    document.getElementById('prov-tel').value=p.telefono||'';
    document.getElementById('prov-email').value=p.email||'';
    document.getElementById('prov-ciudad').value=p.ciudad||'';
    document.getElementById('prov-err').style.display='none';
    showModal('modal-prov');
  },
  async guardar(){
    const err=document.getElementById('prov-err');err.style.display='none';
    const id=document.getElementById('prov-id').value;
    const nombre=document.getElementById('prov-nombre').value.trim();
    if(!nombre){err.textContent='Nombre requerido.';err.style.display='flex';return}
    const datos={nombre,contacto:document.getElementById('prov-contacto').value.trim()||null,
      telefono:document.getElementById('prov-tel').value.trim()||null,
      email:document.getElementById('prov-email').value.trim()||null,
      ciudad:document.getElementById('prov-ciudad').value.trim()||null};
    const r=await api(id?`/proveedores/${id}`:'/proveedores',{method:id?'PUT':'POST',body:JSON.stringify(datos)});
    if(r?.ok){hideModal('modal-prov');toast('Proveedor guardado.');this.cargar()}
    else{err.textContent=r?.mensaje||'Error.';err.style.display='flex'}
  }
};
PROV.init();
</script>
</body>
</html>
