<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POS — Tejidos Castañeda</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav class="tc-nav">
  <div class="tc-nav-brand">
    <img id="nav-logo" src="/img/logo.svg" alt="Logo">
    <span id="nav-biz">Tejidos Castañeda</span>
  </div>
  <div class="tc-nav-right">
    <span id="nav-empleado" class="tc-nav-user"></span>
    <span id="nav-rol" class="tc-nav-rol"></span>
    <a href="/dashboard.html" class="tc-nav-link">Dashboard</a>
    <button onclick="cerrarSesion()" class="tc-btn-logout">Salir</button>
  </div>
</nav>

<div class="pos-layout">

  <!-- PANEL IZQUIERDO: CATÁLOGO -->
  <div class="pos-left">
    <div class="pos-header">
      <h2>Seleccionar productos</h2>
      <div class="pos-search-row">
        <input type="search" id="buscar" class="tc-input" placeholder="Buscar nombre o referencia..." oninput="POS.filtrar()">
        <select id="filtro-cat" class="tc-select" style="width:170px" onchange="POS.filtrar()">
          <option value="">Todas las categorías</option>
        </select>
      </div>
    </div>
    <div class="pos-grid" id="grid-productos">
      <p class="tc-empty" style="grid-column:1/-1">Cargando productos...</p>
    </div>
  </div>

  <!-- PANEL DERECHO: CARRITO -->
  <div class="pos-right">
    <div class="pos-cart-header">
      <h3>Carrito de venta</h3>
      <span class="pos-badge-count" id="badge-items">0</span>
    </div>

    <div class="pos-cart-items" id="cart-items">
      <p class="pos-empty">Selecciona productos del catálogo</p>
    </div>

    <div class="pos-cart-footer">
      <div class="pos-total-line">
        <span>Subtotal</span>
        <span id="disp-subtotal">$ 0</span>
      </div>
      <div class="pos-total-line pos-recargo-line" id="linea-recargo" style="display:none">
        <span>Recargo <span class="pos-badge-recargo" id="badge-recargo"></span></span>
        <span id="disp-recargo">$ 0</span>
      </div>
      <div class="pos-total-main">
        <span>Total</span>
        <span id="disp-total">$ 0</span>
      </div>

      <select id="metodo-pago" class="tc-select" style="margin:10px 0 8px" onchange="POS.actualizarTotales()">
        <option value="efectivo">Efectivo — sin recargo</option>
        <option value="daviplata">Daviplata — sin recargo</option>
        <option value="nequi">Nequi — sin recargo</option>
        <option value="bold">Bold — sin recargo</option>
        <option value="tarjeta">Tarjeta — +5%</option>
        <option value="sistecredito">Sistecrédito — +5%</option>
        <option value="addi">Addi — +10%</option>
      </select>

      <select id="cliente-sel" class="tc-select" style="margin-bottom:10px">
        <option value="">Sin cliente asociado</option>
      </select>

      <button id="btn-cobrar" class="btn-cobrar" onclick="POS.procesar()" disabled>Registrar venta</button>
      <button class="btn-limpiar" onclick="POS.limpiar()">Limpiar carrito</button>
    </div>
  </div>
</div>

<!-- MODAL TICKET -->
<div class="ticket-overlay" id="modal-ticket" style="display:none">
  <div class="ticket-box">
    <div class="ticket-center">
      <img class="ticket-logo" id="t-logo" src="/img/logo.svg" alt="Logo">
      <p class="ticket-biz" id="t-biz">Tejidos Castañeda</p>
      <p style="font-size:11px;color:#555;margin:0" id="t-info"></p>
    </div>
    <hr class="ticket-sep">
    <p style="text-align:center;font-size:11px;margin:0" id="t-venta-num"></p>
    <p style="text-align:center;font-size:11px;color:#555;margin:2px 0" id="t-fecha"></p>
    <p style="text-align:center;font-size:11px;color:#555;margin:0" id="t-empleado"></p>
    <p style="text-align:center;font-size:11px;color:#555;margin:0" id="t-cliente"></p>
    <hr class="ticket-sep">
    <table class="ticket-table">
      <thead><tr><th>Producto</th><th class="r">Cant</th><th class="r">Precio</th><th class="r">Sub</th></tr></thead>
      <tbody id="t-items"></tbody>
    </table>
    <hr class="ticket-sep">
    <div id="t-totales"></div>
    <hr class="ticket-sep">
    <p style="font-size:11px;color:#555;text-align:center;margin:0" id="t-metodo"></p>
    <p style="text-align:center;font-weight:700;margin:8px 0 4px">¡Gracias por su compra!</p>
    <div class="ticket-actions">
      <button class="btn-print" onclick="window.print()">Imprimir</button>
      <button class="btn-close-ticket" onclick="document.getElementById('modal-ticket').style.display='none'">Cerrar</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
proteger();

const RECARGOS={efectivo:0,daviplata:0,nequi:0,bold:0,tarjeta:0.05,sistecredito:0.05,addi:0.10};
let todosProds=[], carrito=[], clientes=[], configNegocio={};

const POS={
  async init(){
    await Promise.all([this.cargarProductos(), this.cargarClientes(), this.cargarConfig()]);
  },

  async cargarConfig(){
    const r=await api('/usuarios/config/publica');
    if(r?.ok){
      configNegocio=r.config;
      if(r.config.logo_url){
        document.getElementById('t-logo').src=r.config.logo_url;
      }
      if(r.config.nombre_negocio){
        document.getElementById('t-biz').textContent=r.config.nombre_negocio;
      }
      const info=[r.config.nit?'NIT: '+r.config.nit:'', r.config.telefono?'Tel: '+r.config.telefono:'', r.config.ciudad||''].filter(Boolean).join(' | ');
      document.getElementById('t-info').textContent=info;
    }
  },

  async cargarProductos(){
    const r=await api('/productos');
    if(!r?.ok)return;
    todosProds=r.productos;
    const cats=[...new Set(r.productos.map(p=>p.categoria).filter(Boolean))];
    const sel=document.getElementById('filtro-cat');
    cats.forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;sel.appendChild(o)});
    this.renderProductos(todosProds);
  },

  async cargarClientes(){
    const r=await api('/clientes');
    if(!r?.ok)return;
    clientes=r.clientes;
    const sel=document.getElementById('cliente-sel');
    r.clientes.forEach(c=>{
      const o=document.createElement('option');
      o.value=c.id;
      o.textContent=c.nombre+(c.telefono?' — '+c.telefono:'');
      sel.appendChild(o);
    });
  },

  filtrar(){
    const q=document.getElementById('buscar').value.toLowerCase();
    const cat=document.getElementById('filtro-cat').value;
    const f=todosProds.filter(p=>
      (!cat||p.categoria===cat)&&
      (!q||p.nombre.toLowerCase().includes(q)||(p.referencia||'').toLowerCase().includes(q))
    );
    this.renderProductos(f);
  },

  renderProductos(lista){
    const g=document.getElementById('grid-productos');
    if(!lista.length){g.innerHTML='<p class="tc-empty" style="grid-column:1/-1">Sin productos</p>';return}
    g.innerHTML=lista.map(p=>{
      const ag=p.stock===0;
      const bajo=p.stock>0&&p.stock<=p.stock_minimo;
      const sc=ag?'tc-red':bajo?'tc-yellow':'';
      const st=ag?'Agotado':bajo?`Stock bajo: ${p.stock}`:`Stock: ${p.stock}`;
      return`<div class="pos-prod${ag?' pos-prod-out':''}" onclick="POS.agregar(${p.id})">
        <div class="pos-prod-name">${p.nombre}</div>
        <div class="pos-prod-cat">${[p.categoria,p.talla,p.color].filter(Boolean).join(' · ')}</div>
        <div class="pos-prod-price">${fmt(p.precio_venta)}</div>
        <div class="pos-prod-stock ${sc}">${st}</div>
      </div>`;
    }).join('');
  },

  agregar(id){
    const p=todosProds.find(x=>x.id===id);
    if(!p||p.stock===0)return;
    const item=carrito.find(x=>x.id===id);
    if(item){
      if(item.qty>=p.stock){toast('Stock máximo: '+p.stock,'warn');return}
      item.qty++;
    }else{
      carrito.push({...p,qty:1});
    }
    this.renderCarrito();
    this.actualizarTotales();
    toast(p.nombre+' agregado');
  },

  cambiarQty(id,delta){
    const idx=carrito.findIndex(x=>x.id===id);
    if(idx===-1)return;
    carrito[idx].qty+=delta;
    const maxStock=todosProds.find(p=>p.id===id)?.stock||0;
    if(carrito[idx].qty<=0)carrito.splice(idx,1);
    else if(carrito[idx].qty>maxStock)carrito[idx].qty=maxStock;
    this.renderCarrito();
    this.actualizarTotales();
  },

  quitar(id){carrito=carrito.filter(x=>x.id!==id);this.renderCarrito();this.actualizarTotales()},

  limpiar(){carrito=[];this.renderCarrito();this.actualizarTotales()},

  renderCarrito(){
    const wrap=document.getElementById('cart-items');
    const badge=document.getElementById('badge-items');
    const total=carrito.reduce((s,i)=>s+i.qty,0);
    badge.textContent=total;
    document.getElementById('btn-cobrar').disabled=carrito.length===0;
    if(!carrito.length){wrap.innerHTML='<p class="pos-empty">Selecciona productos del catálogo</p>';return}
    wrap.innerHTML=carrito.map(item=>{
      const sub=item.precio_venta*item.qty;
      return`<div class="cart-item">
        <div>
          <div class="ci-name">${item.nombre}</div>
          <div class="ci-unit">${fmt(item.precio_venta)} c/u</div>
          <div class="ci-controls">
            <button class="qty-btn" onclick="POS.cambiarQty(${item.id},-1)">−</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" onclick="POS.cambiarQty(${item.id},1)">+</button>
            <button class="qty-del" onclick="POS.quitar(${item.id})">✕</button>
          </div>
        </div>
        <div class="ci-sub">${fmt(sub)}</div>
      </div>`;
    }).join('');
  },

  actualizarTotales(){
    const metodo=document.getElementById('metodo-pago').value;
    const pct=RECARGOS[metodo]||0;
    const subtotal=carrito.reduce((s,i)=>s+i.precio_venta*i.qty,0);
    const recargo=Math.round(subtotal*pct);
    const total=subtotal+recargo;
    document.getElementById('disp-subtotal').textContent=fmt(subtotal);
    document.getElementById('disp-total').textContent=fmt(total);
    const lr=document.getElementById('linea-recargo');
    if(pct>0&&subtotal>0){
      document.getElementById('badge-recargo').textContent='+'+Math.round(pct*100)+'%';
      document.getElementById('disp-recargo').textContent=fmt(recargo);
      lr.style.display='flex';
    }else{lr.style.display='none'}
  },

  async procesar(){
    if(!carrito.length)return;
    const btn=document.getElementById('btn-cobrar');
    btn.disabled=true;btn.textContent='Procesando…';
    const r=await api('/ventas',{method:'POST',body:JSON.stringify({
      items:carrito.map(i=>({productoId:i.id,cantidad:i.qty})),
      metodoPago:document.getElementById('metodo-pago').value,
      clienteId:document.getElementById('cliente-sel').value||null
    })});
    if(r?.ok){
      this.mostrarTicket(r.venta);
      // Actualizar stock local
      for(const item of r.venta.items){
        const p=todosProds.find(x=>x.nombre===item.nombre);
        if(p)p.stock-=item.cantidad;
      }
      this.limpiar();
      this.renderProductos(todosProds);
    }else{
      toast(r?.mensaje||'Error al registrar venta','err');
    }
    btn.disabled=false;btn.textContent='Registrar venta';
  },

  mostrarTicket(v){
    const fecha=new Date(v.fecha);
    document.getElementById('t-venta-num').textContent='Venta N.° '+v.ventaId;
    document.getElementById('t-fecha').textContent=fecha.toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'})+' '+fecha.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('t-empleado').textContent='Atendió: '+v.empleado;
    document.getElementById('t-cliente').textContent=document.getElementById('cliente-sel').selectedOptions[0]?.text!=='Sin cliente asociado'?'Cliente: '+document.getElementById('cliente-sel').selectedOptions[0]?.text:'';
    document.getElementById('t-items').innerHTML=v.items.map(i=>`<tr>
      <td>${i.nombre}${i.talla?' <small style="color:#888">'+i.talla+'</small>':''}</td>
      <td class="r">${i.cantidad}</td>
      <td class="r">${fmt(i.precioUnitario)}</td>
      <td class="r">${fmt(i.subtotal)}</td>
    </tr>`).join('');
    const recStr=v.montoRecargo>0?`<div class="t-line"><span>Recargo (+${Math.round(v.porcentajeRecargo*100)}%)</span><span>${fmt(v.montoRecargo)}</span></div>`:'';
    document.getElementById('t-totales').innerHTML=`
      <div class="t-line"><span>Subtotal</span><span>${fmt(v.subtotal)}</span></div>
      ${recStr}
      <div class="t-line t-total"><strong>TOTAL</strong><strong>${fmt(v.total)}</strong></div>`;
    document.getElementById('t-metodo').textContent='Método de pago: '+v.metodoPagoLabel.toUpperCase();
    document.getElementById('modal-ticket').style.display='flex';
  }
};

POS.init();
</script>
</body>
</html>
