<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clientes — Tejidos Castañeda</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav class="tc-nav">
  <div class="tc-nav-brand"><img id="nav-logo" src="/img/logo.svg" alt="Logo"><span id="nav-biz">Tejidos Castañeda</span></div>
  <div class="tc-nav-right">
    <span id="nav-empleado" class="tc-nav-user"></span>
    <span id="nav-rol" class="tc-nav-rol"></span>
    <a href="/dashboard.html" class="tc-nav-link">Dashboard</a>
    <button onclick="cerrarSesion()" class="tc-btn-logout">Salir</button>
  </div>
</nav>

<div class="tc-wrap">
  <div class="tc-page-header">
    <div><h1 class="tc-page-title">Clientes</h1><p class="tc-page-sub">Registro e historial de compras</p></div>
    <button class="btn-primary" onclick="CL.abrirNuevo()">+ Nuevo cliente</button>
  </div>

  <div class="tc-filters">
    <input type="search" id="buscar-cl" class="tc-input" placeholder="Buscar nombre o teléfono..." style="max-width:280px" oninput="CL.buscar()">
  </div>

  <div class="tc-table-wrap">
    <table class="tc-table">
      <thead><tr><th>Nombre</th><th>Teléfono</th><th>Email</th><th style="text-align:right">Compras</th><th style="text-align:right">Total gastado</th><th>Acciones</th></tr></thead>
      <tbody id="tabla-cl"><tr><td colspan="6" class="tc-empty">Cargando...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="tc-overlay" id="modal-cl" style="display:none">
  <div class="tc-modal" style="max-width:440px">
    <div class="tc-modal-hdr"><h3 id="cl-titulo">Nuevo cliente</h3><button class="tc-modal-close" onclick="hideModal('modal-cl')">×</button></div>
    <div class="tc-modal-body">
      <input type="hidden" id="cl-id">
      <div class="tc-form-group"><label class="tc-label">Nombre *</label><input type="text" id="cl-nombre" class="tc-input" placeholder="Nombre completo"></div>
      <div class="tc-form-row">
        <div class="tc-form-group"><label class="tc-label">Teléfono</label><input type="tel" id="cl-tel" class="tc-input" placeholder="3001234567"></div>
        <div class="tc-form-group"><label class="tc-label">Email</label><input type="email" id="cl-email" class="tc-input" placeholder="correo@ejemplo.com"></div>
      </div>
      <div class="tc-form-group"><label class="tc-label">Dirección</label><input type="text" id="cl-dir" class="tc-input" placeholder="Dirección"></div>
      <div id="cl-err" class="tc-alert tc-alert-err" style="display:none"></div>
    </div>
    <div class="tc-modal-footer">
      <button class="btn-secondary" onclick="hideModal('modal-cl')">Cancelar</button>
      <button class="btn-primary" onclick="CL.guardar()">Guardar</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
proteger();
let todos=[];

const CL={
  async init(){await this.cargar()},
  async cargar(){
    const r=await api('/clientes');
    if(!r?.ok)return;
    todos=r.clientes;
    this.render(todos);
  },
  buscar(){
    const q=document.getElementById('buscar-cl').value.toLowerCase();
    this.render(todos.filter(c=>c.nombre.toLowerCase().includes(q)||(c.telefono||'').includes(q)));
  },
  render(lista){
    const t=document.getElementById('tabla-cl');
    if(!lista.length){t.innerHTML='<tr><td colspan="6" class="tc-empty">Sin clientes</td></tr>';return}
    t.innerHTML=lista.map(c=>`<tr>
      <td style="font-weight:500">${c.nombre}</td>
      <td>${c.telefono||'—'}</td>
      <td style="color:var(--txt3)">${c.email||'—'}</td>
      <td style="text-align:right">${c.total_compras||0}</td>
      <td style="text-align:right;color:var(--success);font-weight:500">${fmt(c.total_gastado||0)}</td>
      <td><button class="btn-sm" onclick="CL.editar(${JSON.stringify(JSON.stringify(c))})">Editar</button>
          <a href="/apartados.html?cliente=${c.id}" class="btn-sm">Apartados</a></td>
    </tr>`).join('');
  },
  abrirNuevo(){
    ['cl-id','cl-nombre','cl-tel','cl-email','cl-dir'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
    document.getElementById('cl-titulo').textContent='Nuevo cliente';
    document.getElementById('cl-err').style.display='none';
    showModal('modal-cl');
  },
  editar(jsonStr){
    const c=JSON.parse(jsonStr);
    document.getElementById('cl-titulo').textContent='Editar cliente';
    document.getElementById('cl-id').value=c.id;
    document.getElementById('cl-nombre').value=c.nombre||'';
    document.getElementById('cl-tel').value=c.telefono||'';
    document.getElementById('cl-email').value=c.email||'';
    document.getElementById('cl-dir').value=c.direccion||'';
    document.getElementById('cl-err').style.display='none';
    showModal('modal-cl');
  },
  async guardar(){
    const err=document.getElementById('cl-err');err.style.display='none';
    const id=document.getElementById('cl-id').value;
    const nombre=document.getElementById('cl-nombre').value.trim();
    if(!nombre){err.textContent='Nombre requerido.';err.style.display='flex';return}
    const datos={nombre,telefono:document.getElementById('cl-tel').value.trim()||null,email:document.getElementById('cl-email').value.trim()||null,direccion:document.getElementById('cl-dir').value.trim()||null};
    const r=await api(id?`/clientes/${id}`:'/clientes',{method:id?'PUT':'POST',body:JSON.stringify(datos)});
    if(r?.ok){hideModal('modal-cl');toast('Cliente guardado.');this.cargar()}
    else{err.textContent=r?.mensaje||'Error.';err.style.display='flex'}
  }
};
CL.init();
</script>
</body>
</html>
