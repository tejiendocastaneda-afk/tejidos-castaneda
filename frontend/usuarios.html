<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Usuarios — Tejidos Castañeda</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav class="tc-nav">
  <div class="tc-nav-brand"><img id="nav-logo" src="/img/logo.svg" alt="Logo"><span id="nav-biz">Tejidos Castañeda</span></div>
  <div class="tc-nav-right">
    <span id="nav-empleado" class="tc-nav-user"></span>
    <span id="nav-rol" class="tc-nav-rol"></span>
    <a href="/dashboard.html" class="tc-nav-link">Dashboard</a>
    <button onclick="cerrarSesion()" class="tc-btn-logout">Salir</button>
  </div>
</nav>

<div class="tc-wrap">
  <div class="tc-page-header">
    <div><h1 class="tc-page-title">Usuarios</h1><p class="tc-page-sub">Gestión de accesos y roles del sistema</p></div>
    <div class="tc-actions">
      <button class="btn-secondary" onclick="USR.cambiarPassword()">Cambiar mi contraseña</button>
      <button class="btn-primary" onclick="USR.abrirNuevo()">+ Nuevo usuario</button>
    </div>
  </div>

  <div class="tc-table-wrap">
    <table class="tc-table">
      <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th><th>Creado</th><th>Acciones</th></tr></thead>
      <tbody id="tabla-usr"><tr><td colspan="6" class="tc-empty">Cargando...</td></tr></tbody>
    </table>
  </div>

  <div class="tc-card" style="margin-top:20px">
    <div class="tc-card-title">Configuración del negocio</div>
    <div class="tc-form-row" style="margin-bottom:12px">
      <div class="tc-form-group"><label class="tc-label">Nombre del negocio</label><input type="text" id="cfg-nombre" class="tc-input"></div>
      <div class="tc-form-group"><label class="tc-label">NIT</label><input type="text" id="cfg-nit" class="tc-input"></div>
    </div>
    <div class="tc-form-row" style="margin-bottom:12px">
      <div class="tc-form-group"><label class="tc-label">Teléfono</label><input type="text" id="cfg-tel" class="tc-input"></div>
      <div class="tc-form-group"><label class="tc-label">Ciudad</label><input type="text" id="cfg-ciudad" class="tc-input"></div>
    </div>
    <div class="tc-form-group"><label class="tc-label">Dirección</label><input type="text" id="cfg-dir" class="tc-input"></div>
    <div class="tc-form-group">
      <label class="tc-label">Logo del negocio</label>
      <div style="display:flex;gap:10px;align-items:center">
        <input type="file" id="inp-logo" accept="image/*" class="tc-input" style="padding:6px;flex:1">
        <button class="btn-primary" onclick="USR.subirLogo()">Subir logo</button>
      </div>
    </div>
    <button class="btn-primary" onclick="USR.guardarConfig()">Guardar configuración</button>
  </div>
</div>

<!-- MODAL USUARIO -->
<div class="tc-overlay" id="modal-usr" style="display:none">
  <div class="tc-modal" style="max-width:440px">
    <div class="tc-modal-hdr"><h3 id="usr-titulo">Nuevo usuario</h3><button class="tc-modal-close" onclick="hideModal('modal-usr')">×</button></div>
    <div class="tc-modal-body">
      <input type="hidden" id="usr-id">
      <div class="tc-form-group"><label class="tc-label">Nombre *</label><input type="text" id="usr-nombre" class="tc-input"></div>
      <div class="tc-form-group"><label class="tc-label">Email *</label><input type="email" id="usr-email" class="tc-input"></div>
      <div class="tc-form-row">
        <div class="tc-form-group"><label class="tc-label">Contraseña</label><input type="password" id="usr-pass" class="tc-input" placeholder="Mínimo 6 caracteres"></div>
        <div class="tc-form-group"><label class="tc-label">Rol *</label>
          <select id="usr-rol" class="tc-select">
            <option value="empleado">Empleado</option>
            <option value="propietario">Propietario</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
      </div>
      <div id="usr-err" class="tc-alert tc-alert-err" style="display:none"></div>
    </div>
    <div class="tc-modal-footer">
      <button class="btn-secondary" onclick="hideModal('modal-usr')">Cancelar</button>
      <button class="btn-primary" onclick="USR.guardar()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL CAMBIAR CONTRASEÑA -->
<div class="tc-overlay" id="modal-pass" style="display:none">
  <div class="tc-modal" style="max-width:400px">
    <div class="tc-modal-hdr"><h3>Cambiar contraseña</h3><button class="tc-modal-close" onclick="hideModal('modal-pass')">×</button></div>
    <div class="tc-modal-body">
      <div class="tc-form-group"><label class="tc-label">Contraseña actual *</label><input type="password" id="pass-actual" class="tc-input"></div>
      <div class="tc-form-group"><label class="tc-label">Nueva contraseña *</label><input type="password" id="pass-nueva" class="tc-input" placeholder="Mínimo 6 caracteres"></div>
      <div id="pass-err" class="tc-alert tc-alert-err" style="display:none"></div>
    </div>
    <div class="tc-modal-footer">
      <button class="btn-secondary" onclick="hideModal('modal-pass')">Cancelar</button>
      <button class="btn-primary" onclick="USR.confirmarCambioPass()">Cambiar</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
proteger('admin');

const USR={
  async init(){
    await Promise.all([this.cargar(), this.cargarConfig()]);
  },
  async cargar(){
    const r=await api('/usuarios');
    if(!r?.ok)return;
    const yo=getUsuario();
    document.getElementById('tabla-usr').innerHTML=r.usuarios.map(u=>`<tr>
      <td style="font-weight:500">${u.nombre}</td>
      <td style="color:var(--txt2)">${u.email}</td>
      <td><span class="badge badge-info" style="text-transform:capitalize">${u.rol}</span></td>
      <td><span class="badge ${u.activo?'badge-ok':'badge-gray'}">${u.activo?'Activo':'Inactivo'}</span></td>
      <td style="color:var(--txt3)">${new Date(u.created_at).toLocaleDateString('es-CO')}</td>
      <td>${u.id!==yo.id?`<button class="btn-sm" onclick="USR.editar(${JSON.stringify(JSON.stringify(u))})">Editar</button>
        <button class="btn-danger" onclick="USR.desactivar(${u.id})">${u.activo?'Desactivar':'Activar'}</button>`:'<span style="font-size:11px;color:var(--txt3)">Tu cuenta</span>'}</td>
    </tr>`).join('');
  },
  async cargarConfig(){
    const r=await api('/usuarios/config/publica');
    if(!r?.ok)return;
    const c=r.config;
    document.getElementById('cfg-nombre').value=c.nombre_negocio||'';
    document.getElementById('cfg-nit').value=c.nit||'';
    document.getElementById('cfg-tel').value=c.telefono||'';
    document.getElementById('cfg-ciudad').value=c.ciudad||'';
    document.getElementById('cfg-dir').value=c.direccion||'';
  },
  abrirNuevo(){
    ['usr-id','usr-nombre','usr-email','usr-pass'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
    document.getElementById('usr-rol').value='empleado';
    document.getElementById('usr-titulo').textContent='Nuevo usuario';
    document.getElementById('usr-err').style.display='none';
    showModal('modal-usr');
  },
  editar(jsonStr){
    const u=JSON.parse(jsonStr);
    document.getElementById('usr-titulo').textContent='Editar usuario';
    document.getElementById('usr-id').value=u.id;
    document.getElementById('usr-nombre').value=u.nombre||'';
    document.getElementById('usr-email').value=u.email||'';
    document.getElementById('usr-pass').value='';
    document.getElementById('usr-rol').value=u.rol||'empleado';
    document.getElementById('usr-err').style.display='none';
    showModal('modal-usr');
  },
  async guardar(){
    const err=document.getElementById('usr-err');err.style.display='none';
    const id=document.getElementById('usr-id').value;
    const datos={nombre:document.getElementById('usr-nombre').value.trim(),email:document.getElementById('usr-email').value.trim(),rol:document.getElementById('usr-rol').value};
    const pass=document.getElementById('usr-pass').value;
    if(pass)datos.password=pass;
    if(!datos.nombre||!datos.email){err.textContent='Nombre y email requeridos.';err.style.display='flex';return}
    if(!id&&!pass){err.textContent='Contraseña requerida para nuevo usuario.';err.style.display='flex';return}
    const r=await api(id?`/usuarios/${id}`:'/usuarios',{method:id?'PUT':'POST',body:JSON.stringify(datos)});
    if(r?.ok){hideModal('modal-usr');toast('Usuario guardado.');this.cargar()}
    else{err.textContent=r?.mensaje||'Error.';err.style.display='flex'}
  },
  async desactivar(id){
    if(!confirm('¿Confirmar acción sobre este usuario?'))return;
    const r=await api(`/usuarios/${id}`,{method:'DELETE'});
    if(r?.ok){toast('Usuario actualizado.');this.cargar()}
    else toast(r?.mensaje||'Error','err');
  },
  cambiarPassword(){
    document.getElementById('pass-actual').value='';
    document.getElementById('pass-nueva').value='';
    document.getElementById('pass-err').style.display='none';
    showModal('modal-pass');
  },
  async confirmarCambioPass(){
    const err=document.getElementById('pass-err');err.style.display='none';
    const actual=document.getElementById('pass-actual').value;
    const nueva=document.getElementById('pass-nueva').value;
    if(!actual||!nueva){err.textContent='Completa todos los campos.';err.style.display='flex';return}
    if(nueva.length<6){err.textContent='Mínimo 6 caracteres.';err.style.display='flex';return}
    const r=await api('/auth/cambiar-password',{method:'PUT',body:JSON.stringify({passwordActual:actual,passwordNuevo:nueva})});
    if(r?.ok){hideModal('modal-pass');toast('Contraseña actualizada.')}
    else{err.textContent=r?.mensaje||'Error.';err.style.display='flex'}
  },
  async guardarConfig(){
    const r=await api('/usuarios/config/general',{method:'PUT',body:JSON.stringify({
      nombre_negocio:document.getElementById('cfg-nombre').value,
      nit:document.getElementById('cfg-nit').value,
      telefono:document.getElementById('cfg-tel').value,
      ciudad:document.getElementById('cfg-ciudad').value,
      direccion:document.getElementById('cfg-dir').value
    })});
    if(r?.ok)toast('Configuración guardada.');
    else toast(r?.mensaje||'Error','err');
  },
  async subirLogo(){
    const file=document.getElementById('inp-logo').files[0];
    if(!file){toast('Selecciona una imagen','warn');return}
    const fd=new FormData();fd.append('logo',file);
    const r=await fetch('/api/usuarios/logo',{method:'POST',headers:{'Authorization':'Bearer '+getToken()},body:fd}).then(x=>x.json());
    if(r?.ok)toast('Logo actualizado. Recarga la página para verlo.');
    else toast(r?.mensaje||'Error','err');
  }
};
USR.init();
</script>
</body>
</html>
