<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tejidos Castañeda — Ingresar</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-bg">
<div class="login-card">
  <div class="login-logo">
    <img id="login-logo" src="/img/logo.svg" alt="Logo">
  </div>
  <h1 class="login-title" id="login-title">Tejidos Castañeda</h1>
  <p class="login-sub">Sistema de gestión de ventas</p>

  <div id="login-err" class="tc-alert tc-alert-err" style="display:none"></div>

  <div class="tc-form-group">
    <label class="tc-label">Correo electrónico</label>
    <input type="email" id="email" class="tc-input" placeholder="admin@tejidos.com" autocomplete="username">
  </div>
  <div class="tc-form-group">
    <label class="tc-label">Contraseña</label>
    <input type="password" id="pass" class="tc-input" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button id="btn-login" class="btn-primary" style="width:100%;padding:11px;font-size:14px;margin-top:4px">Ingresar</button>
</div>

<script src="/js/api.js"></script>
<script>
// Si ya hay sesión activa ir al dashboard
if(getToken())location.href='/dashboard.html';

async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  const err=document.getElementById('login-err');
  const btn=document.getElementById('btn-login');
  err.style.display='none';
  if(!email||!pass){err.textContent='Completa todos los campos.';err.style.display='flex';return}
  btn.disabled=true;btn.textContent='Verificando…';
  const r=await api('/auth/login',{method:'POST',body:JSON.stringify({email,password:pass})});
  if(r?.ok){
    guardarSesion(r.token,r.usuario);
    if(r.alertas?.apartadosVencidos>0)sessionStorage.setItem('tc_alerta_vencidos',r.alertas.apartadosVencidos);
    location.href='/dashboard.html';
  }else{
    err.textContent=r?.mensaje||'Error al ingresar.';
    err.style.display='flex';
    btn.disabled=false;btn.textContent='Ingresar';
  }
}

document.getElementById('btn-login').addEventListener('click',doLogin);
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
